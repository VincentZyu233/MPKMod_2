name: Build & Release

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      target_version: ${{ steps.flags.outputs.target_version }}
      target_dir: ${{ steps.flags.outputs.target_dir }}
      mod_version: ${{ steps.flags.outputs.mod_version }}
      release_tag: ${{ steps.flags.outputs.release_tag }}
      asset_name: ${{ steps.flags.outputs.asset_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="$PR_TITLE"
          else
            MSG="$COMMIT_MSG"
          fi

          MOD_VERSION="$(grep '^\$version=' gradle.properties | head -1 | cut -d= -f2-)"
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected mod version: $MOD_VERSION"

          TARGET_VERSION="$(printf '%s\n' "$MSG" | grep -oiE -- '--version[[:space:]]+[^ )]+' | head -1 | sed -E 's/^--version[[:space:]]+//I')"

          BUILD=false
          RELEASE=false

          if [ -n "$TARGET_VERSION" ] && [ -d "$TARGET_VERSION" ]; then
            if printf '%s\n' "$MSG" | grep -qi "build release"; then
              BUILD=true
              RELEASE=true
            elif printf '%s\n' "$MSG" | grep -qi "build action"; then
              BUILD=true
            fi
          fi

          TARGET_DIR="$TARGET_VERSION"
          RELEASE_TAG=""
          ASSET_NAME=""
          if [ -n "$TARGET_VERSION" ]; then
            RELEASE_TAG="v${MOD_VERSION}-${TARGET_VERSION}"
            ASSET_NAME="mpkmod-${MOD_VERSION}-${TARGET_VERSION}.jar"
          fi

          echo "target_version=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "should_build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"

          echo "Commit message: $MSG"
          echo "Target version: ${TARGET_VERSION:-<none>}"
          echo "Flags: build=$BUILD release=$RELEASE"

  build:
    name: Build target JAR
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build selected target
        env:
          BUILD_TARGET_PROJECT: ${{ needs.check.outputs.target_dir }}
        run: ./gradlew "${{ needs.check.outputs.target_dir }}:build" "${{ needs.check.outputs.target_dir }}:remapJar"

      - name: Prepare artifact
        shell: bash
        run: |
          TARGET_DIR="${{ needs.check.outputs.target_dir }}"
          ASSET_NAME="${{ needs.check.outputs.asset_name }}"
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name "*${TARGET_DIR}.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | head -1)

          if [ -z "$JAR_FILE" ]; then
            echo "No output jar found for $TARGET_DIR"
            find build -maxdepth 3 -type f -name '*.jar' || true
            exit 1
          fi

          cp "$JAR_FILE" "$ASSET_NAME"
          echo "Prepared $ASSET_NAME from $JAR_FILE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check.outputs.asset_name }}
          path: ${{ needs.check.outputs.asset_name }}

  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.release_tag }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || echo "No existing release to delete"
          sleep 3

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
          TARGET_VERSION: ${{ needs.check.outputs.target_version }}
          MOD_VERSION: ${{ needs.check.outputs.mod_version }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -1)

          collect_changelog() {
            local range_args=("$@")
            git log "${range_args[@]}" --pretty=format:'%s|%h|%an|%ad' --date=format:'%Y-%m-%d %H:%M' --reverse \
              | grep -Evi '^chore: trigger release; build release\|' \
              | awk -F'|' '{
                  subj=$1
                  if (length(subj) > 100) subj=substr(subj, 1, 97) "..."
                  print subj " (`" $2 "`) - @" $3 " [" $4 "]"
                }'
          }

          if [ -n "$PREV_TAG" ]; then
            collect_changelog "${PREV_TAG}..HEAD" > changelog_raw.txt
          else
            collect_changelog > changelog_raw.txt
          fi

          if [ -s changelog_raw.txt ]; then
            sed 's/^/> /; G' changelog_raw.txt > changelog_rendered.txt
          else
            echo '> No changelog entries.' > changelog_rendered.txt
          fi

          {
            while IFS= read -r line || [ -n "$line" ]; do
              if [ "$line" = "__CHANGE_LOG__" ]; then
                cat changelog_rendered.txt
                continue
              fi

              line="${line//__REPO__/$REPO}"
              line="${line//__RELEASE_TAG__/$RELEASE_TAG}"
              line="${line//__MOD_VERSION__/$MOD_VERSION}"
              line="${line//__TARGET_VERSION__/$TARGET_VERSION}"
              line="${line//__BRANCH__/${{ github.ref_name }}}"
              line="${line//__COMMIT_HASH__/${{ github.sha }}}"
              printf '%s\n' "$line"
            done < .github/release_template.md
          } > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.release_tag }}"
          ASSET_NAME="${{ needs.check.outputs.asset_name }}"
          gh release create "$TAG" \
            --title "MPK Mod ${TAG}" \
            --notes-file release_notes.md \
            --latest \
            "$ASSET_NAME"
